<ion-header>

  <ion-toolbar class="toolbar-login">

    <ion-title>

      FashionStore

    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content [fullscreen]="true">

  <div class="login-container">

    <ion-icon
      name="bag-handle"
      class="logo">
    </ion-icon>

    <h1>Bienvenido</h1>

    <p>

      Inicia sesión para continuar

    </p>

    <ion-card>

      <ion-card-content>

        <ion-item>

          <ion-icon
            slot="start"
            name="mail-outline">
          </ion-icon>

          <ion-input

            type="email"

            placeholder="Correo electrónico"

            [(ngModel)]="usuario">

          </ion-input>

        </ion-item>

        <ion-item>

          <ion-icon
            slot="start"
            name="lock-closed-outline">
          </ion-icon>

          <ion-input

            type="password"

            placeholder="Contraseña"

            [(ngModel)]="password">

          </ion-input>

        </ion-item>

        <ion-button

          expand="block"

          class="btn-login"

          (click)="ingresar()">

          Ingresar

        </ion-button>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
