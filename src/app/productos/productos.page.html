<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let producto of productos">

    <img [src]="producto.imagen">

    <ion-card-header>
      <ion-card-title>
        {{ producto.nombre }}
      </ion-card-title>
    </ion-card-header>

    <ion-card-content>

      Precio:
      ${{ producto.precio }}

      <br><br>

      <ion-button expand="block">
        Agregar al carrito
      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
